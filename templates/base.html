<!DOCTYPE html>
<html>
<head>
    <title>Bookstore Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="text-center py-4 bg-dark text-white">
    <h1>Bookstore Management System</h1>

    <nav class="mt-3">
        <a href="{{ url_for('books_page') }}" class="btn btn-light me-2">Home</a>
        <a href="{{ url_for('add_book_page') }}" class="btn btn-success">Add Book</a>
    </nav>
</header>

<div class="container">
    {% with messages = get_flashed_messages() %}
    {% if messages %}

    <div class="alert alert-success">

        {% for message in messages %}
        {{ message }}
        {% endfor %}

    </div>

    {% endif %}
    {% endwith %}
    
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
